<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Dashboard - EcoPackAI</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background:#f4f7f9;
}

.container {
    margin-top:40px;
}

.card {
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

<h3 class="text-success mb-4">EcoPackAI Dashboard</h3>


<div class="card mb-4">

<h5>Enter Packaging Details</h5>

<input id="weight" class="form-control mb-2" placeholder="Weight">
<input id="strength" class="form-control mb-2" placeholder="Strength">
<input id="capacity" class="form-control mb-2" placeholder="Capacity">

<button onclick="predict()" class="btn btn-success">
Predict
</button>

</div>


<div class="card mb-4">
<h5>Result</h5>
<p id="result"></p>
</div>



<div class="card mb-4">
<h5>Model Metrics</h5>
<p id="metrics"></p>
</div>



<div class="card">
<h5>Analytics</h5>
<canvas id="chart"></canvas>
</div>

</div>

<script>

let chartInstance = null

async function predict(){

let weight = document.getElementById("weight").value
let strength = document.getElementById("strength").value
let capacity = document.getElementById("capacity").value

if(!weight || !strength || !capacity){
alert("Please fill all fields")
return
}

let res = await fetch("/predict",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
weight,
strength,
capacity
})
})

let data = await res.json()


document.getElementById("result").innerHTML = ""
document.getElementById("metrics").innerHTML = ""


document.getElementById("result").innerHTML = `
<b>Material:</b> ${data.recommended_material}<br>
<b>Cost:</b> ${data.predicted_cost}<br>
<b>CO2:</b> ${data.predicted_co2}
`

document.getElementById("metrics").innerHTML = `
Cost Model → RMSE: ${data.metrics.cost_model.rmse}, 
MAE: ${data.metrics.cost_model.mae}, 
R²: ${data.metrics.cost_model.r2} <br>

CO2 Model → RMSE: ${data.metrics.co2_model.rmse}, 
MAE: ${data.metrics.co2_model.mae}, 
R²: ${data.metrics.co2_model.r2}
`


let labels = data.ranking.map(r => r.material)
let costs = data.ranking.map(r => r.cost)

let ctx = document.getElementById("chart").getContext("2d")


if(chartInstance){
chartInstance.destroy()
}

chartInstance = new Chart(ctx,{
type:"bar",
data:{
labels: labels,
datasets:[{
label:"Cost Comparison",
data: costs
}]
}
})

}

</script>

</body>
</html>
