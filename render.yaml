services:
  - type: web
    name: ecopackai
    env: python
    pythonVersion: 3.10.13
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DB_NAME
        value: your_db_name
      - key: DB_USER
        value: your_user
      - key: DB_PASSWORD
        value: your_password
      - key: DB_HOST
        value: your-db-host.render.com
      - key: DB_PORT
        value: "5432"