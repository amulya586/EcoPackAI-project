services:
  - type: web
    name: ecopackai
    env: python
    pythonVersion: 3.10.13
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DB_NAME
        value: ecopackai
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        value: amulya586
      - key: DB_HOST
        value: localhost
      - key: DB_PORT
        value: "5432"