services:
  - type: web
    name: ecopackai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DB_NAME
        value: ecopackai
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        value: your_password
      - key: DB_HOST
        value: your_host
      - key: DB_PORT
        value: "5432"